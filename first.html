<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="first.css">
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
  
  <h1>Registration Form</h1>
<table class="card">
  <tr>
    <td>
      <label for="txt1">Name:</label></td>
      <td>
<input id="txt1" type="text" placeholder="Enter Your Name" maxlength="15">
    </td>
  </tr>
 <tr>
    <td>
<label for="txt2">Father Name:</label></td>
<td>
<input id="txt2" type="text" placeholder="Enter Your Father Name" maxlength="15">
  </td>
  </tr>
 <tr><td>
<label for="txt3">Mobile Number:</label></td>
<td>
<input id="txt3" type="number" placeholder="Enter Your Mobile Number">
</td>
  </tr>
  <tr><td>
<label for="txt4">Gmail:</label></td>
<td>
<input id="txt4" type="email" placeholder="Enter Your Mail Id">
</td></tr>
  <tr><td>
<label for="txt5">Password:</label></td>
<td>
<input id="txt5" type="password" placeholder="Enter Your Password">
</td></tr>
  <tr><td>
<label for="txt6">Gender:</label></td>
<td>
<input id="txt6" type="radio" name="grp1">Male
<input id="txt6" type="radio" name="grp1">Fe-Male
<input id="txt6" type="radio" name="grp1">Others
</td></tr>
<tr><td>
<label for="txt7">File:</label></td>
<td>
<input id="txt7" type="file" placeholder="Choose File">
</td></tr>
<tr><td>
<label for="txt8">Comments:</label></td>
<td>
<textarea id="txt8" type="textarea" placeholder="Write Here" rows="5" columns="10"></textarea>
</td></tr>
<tr><td>
<!-- <tr><td>
<label for="txt9">File:</label></td>
<td> -->
<input id="txt9" type="button"  value="Submit">
</td></tr>
</table>    
</body>


</html>
