<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="list.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Ordered List</h1>
    <ol class="ordered">
        <li>Ram Charan</li>
        <li>NTR</li>
        <li>Prabhas</li>
        <li>Rana</li>
    </ol>    
    <ol class="ord">
        <li>Ram Charan</li>
        <li>NTR</li>
        <li>Prabhas</li>
        <li>Rana</li>
    </ol>
    <h1>Unordered List</h1>
    <ul class="nordered">
        <li>Ram Charan</li>
        <li>NTR</li>
        <li>Prabhas</li>
        <li>Rana</li>
    </ul>    
    <ul class="nord">
        <li>Ram Charan</li>
        <li>NTR</li>
        <li>Prabhas</li>
        <li>Rana</li>
    </ul>
    
</body>
</html>
